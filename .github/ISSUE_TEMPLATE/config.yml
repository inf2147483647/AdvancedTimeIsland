# 为 AdvancedTimeIsland 仓库配置 issue forms
# https://docs.github.com/zh/communities/using-templates-to-configure-issue-tracking-for-your-repository

blank_issues_enabled: true

issue_template:
  - name: Bug 反馈
    description: 在使用 AdvancedTimeIsland 的过程中遇到了 Bug。
    file: .github/ISSUE_TEMPLATE/BugReport.yml
  - name: 功能请求
    description: 提出一项新的功能。
    file: .github/ISSUE_TEMPLATE/FeatureRequest.yml

contact_links:
  - name: 项目主页
    url: https://github.com/inf2147483647/AdvancedTimeIsland
    about: 请访问项目主页获取更多信息
  - name: 文档/Wiki
    url: https://github.com/inf2147483647/AdvancedTimeIsland/wiki
    about: 查看项目文档和使用指南
  - name: 讨论区
    url: https://github.com/inf2147483647/AdvancedTimeIsland/discussions
    about: 如有一般性问题，可在讨论区发起讨论
